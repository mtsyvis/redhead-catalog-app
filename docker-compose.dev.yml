# LOCAL DEVELOPMENT ONLY
# PostgreSQL for local development (port 5433 to avoid conflict with Windows PostgreSQL)
# Production docker-compose.yml will be created in Commit 14 and will include both app + postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: redhead-catalog-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redhead_sites_catalog
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
