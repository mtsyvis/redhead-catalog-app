name: app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: redhead_sites_catalog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=redhead_sites_catalog;Username=postgres;Password=${POSTGRES_PASSWORD}
      SeedData__SuperAdmin__Email: ${SEED_SUPERADMIN_EMAIL}
      SeedData__SuperAdmin__Password: ${SEED_SUPERADMIN_PASSWORD}
      GoogleDrive__ClientId: ${GOOGLE_DRIVE_CLIENT_ID}
      GoogleDrive__ClientSecret: ${GOOGLE_DRIVE_CLIENT_SECRET}
      GoogleDrive__RedirectUri: ${GOOGLE_DRIVE_REDIRECT_URI}
      GoogleDrive__AppName: ${GOOGLE_DRIVE_APP_NAME}
      GoogleDrive__ExportFolderName: ${GOOGLE_DRIVE_EXPORT_FOLDER_NAME}
      EmergencySitesExport__Enabled: ${EmergencySitesExport__Enabled:-false}
      EmergencySitesExport__ScheduleCron: ${EmergencySitesExport__ScheduleCron:-30 3 * * MON}
      EmergencySitesExport__GoogleDriveFolderId: ${EmergencySitesExport__GoogleDriveFolderId:-}
      EmergencySitesExport__ServiceAccountJsonPath: ${EmergencySitesExport__ServiceAccountJsonPath:-/run/secrets/google-service-account.json}
      EmergencySitesExport__RetentionWeeks: ${EmergencySitesExport__RetentionWeeks:-8}
      EmergencySitesExport__FilePrefix: ${EmergencySitesExport__FilePrefix:-redhead-sites-full}
      EmergencySitesExport__UploadTimeoutMinutes: ${EmergencySitesExport__UploadTimeoutMinutes:-30}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
      - /etc/redhead/secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  dataprotection_keys:
  caddy_data:
  caddy_config:
